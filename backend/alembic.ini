# Alembic configuration — schema migrations for the CofICab backend.
# The DB URL is resolved at runtime from DATABASE_URL (see alembic/env.py),
# not hardcoded here, so the same migrations run against dev and production.
[alembic]
script_location = alembic
prepend_sys_path = .
# Use a path-version separator that works on Windows and POSIX.
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
