version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coficab_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coficab_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coficab_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  osrm:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld /data/tunisia-latest.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coficab_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coficab_db
      REDIS_URL: redis://redis:6379
      BACKEND_API_URL: http://backend:8000
      OSRM_BASE_URL: http://osrm:5000
      OSRM_PROFILE: driving
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coficab_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: coficab_orchestrator
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_URL: http://backend:8000
      WATCH_FOLDER: /shared_folder
      POLL_INTERVAL_SECONDS: 300
      DELAY_THRESHOLD_MINUTES: 10
      SCHEDULE_HOUR: 15
      SCHEDULE_MINUTE: 0
      SECONDARY_MINUTE: 5
    ports:
      - "9000:9000"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./orchestrator:/app
      - ./agents:/agents
      - ./shared_folder:/shared_folder
    command: uvicorn main:app --host 0.0.0.0 --port 9000
    restart: on-failure

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: coficab_network
