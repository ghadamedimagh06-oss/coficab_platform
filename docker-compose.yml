version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: coficab_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coficab_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: coficab_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coficab_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coficab_db
      REDIS_URL: redis://redis:6379
      BACKEND_API_URL: http://backend:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Next.js) ✅ FIXED
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coficab_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Agent 1
  agent1_watchdog:
    build:
      context: ./agents/agent1_watchdog
      dockerfile: Dockerfile
    container_name: coficab_agent1
    environment:
      BACKEND_API_URL: http://backend:8000
      WATCH_DIRECTORY: /shared_folder
    depends_on:
      - backend
    volumes:
      - ./shared_folder:/shared_folder
      - ./agents/agent1_watchdog:/app
    command: python main.py
    restart: on-failure

  # Agent 2
  agent2_scheduler:
    build:
      context: ./agents/agent2_scheduler
      dockerfile: Dockerfile
    container_name: coficab_agent2
    environment:
      BACKEND_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./agents/agent2_scheduler:/app
    command: python main.py
    restart: on-failure

  # Agent 3
  agent3_alert:
    build:
      context: ./agents/agent3_alert
      dockerfile: Dockerfile
    container_name: coficab_agent3
    environment:
      BACKEND_API_URL: http://backend:8000
      REDIS_URL: redis://redis:6379
      MONITOR_INTERVAL: 10
    depends_on:
      - backend
      - redis
    volumes:
      - ./agents/agent3_alert:/app
    command: python main.py
    restart: on-failure

  # Agent 4
  agent4_tracker:
    build:
      context: ./agents/agent4_tracker
      dockerfile: Dockerfile
    container_name: coficab_agent4
    environment:
      BACKEND_API_URL: http://backend:8000
      TFM_API_URL: http://tfm-api:8080
      POLL_INTERVAL: 300
    depends_on:
      - backend
    volumes:
      - ./agents/agent4_tracker:/app
    command: python main.py
    restart: on-failure

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: coficab_network